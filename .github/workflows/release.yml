name: Release

on:
  # Auto-release on every PR merge to main.
  # Label the PR "minor" or "major" to control the bump; unlabeled = patch.
  pull_request:
    types: [closed]
    branches: [main]

  # Manual override — useful for hotfixes or forcing a specific bump type.
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    # PR trigger: only run when the PR was actually merged (not just closed).
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine bump type
        id: bump
        env:
          # Assigned by Actions (not bash) so label names with single quotes are safe.
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          # Validated below before use — choice constraint is UI-only, API allows any string.
          BUMP_INPUT: ${{ inputs.bump }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${BUMP_INPUT}" in
              major|minor|patch) echo "type=${BUMP_INPUT}" >> $GITHUB_OUTPUT ;;
              *) echo "type=patch" >> $GITHUB_OUTPUT ;;
            esac
          else
            if echo "${PR_LABELS}" | grep -qi '"major"'; then
              echo "type=major" >> $GITHUB_OUTPUT
            elif echo "${PR_LABELS}" | grep -qi '"minor"'; then
              echo "type=minor" >> $GITHUB_OUTPUT
            else
              echo "type=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(grep -m1 "define( 'GUIDWELL_VERSION'" guidwell.php \
            | grep -oP "'\K[0-9]+\.[0-9]+\.[0-9]+")

          if [ -z "$CURRENT" ]; then
            echo "ERROR: Could not parse current version from guidwell.php" >&2
            exit 1
          fi

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT → $NEW (${{ steps.bump.outputs.type }})"

          sed -i "s/ \* Version: ${CURRENT}/ \* Version: ${NEW}/" guidwell.php
          sed -i "s/define( 'GUIDWELL_VERSION', '${CURRENT}' )/define( 'GUIDWELL_VERSION', '${NEW}' )/" guidwell.php

          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW}"    >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS
        run: npm run build

      - name: Install PHP dependencies (production only)
        run: composer update --no-dev --optimize-autoloader

      - name: Build plugin zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p /tmp/build/guidwell

          rsync -rc \
            --exclude-from=.distignore \
            ./ /tmp/build/guidwell/

          cd /tmp/build
          zip -r guidwell-${VERSION}.zip guidwell/

          echo "ZIP_PATH=/tmp/build/guidwell-${VERSION}.zip" >> $GITHUB_ENV

      - name: Commit version bump and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add guidwell.php
          git commit -m "bump version to ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main "${{ steps.version.outputs.tag }}"

      - name: Generate release notes
        env:
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 << 'PYEOF'
          import subprocess, os, re

          current_tag = os.environ['CURRENT_TAG']
          repo        = os.environ['REPO']
          bump_type   = os.environ.get('BUMP_TYPE', 'patch')
          pr_title    = os.environ.get('PR_TITLE', '')
          pr_body     = os.environ.get('PR_BODY', '')
          pr_number   = os.environ.get('PR_NUMBER', '')

          # Find the previous tag (sorted by semver)
          raw_tags = subprocess.check_output(['git', 'tag', '--sort=-version:refname']).decode().strip()
          tags = [t for t in raw_tags.split('\n') if t and t != current_tag]
          prev_tag = tags[0] if tags else None

          # Collect commits since the previous tag, skipping auto-bump commits and merges
          log_range = f"{prev_tag}..{current_tag}" if prev_tag else current_tag
          raw_log = subprocess.check_output([
              'git', 'log', log_range,
              '--pretty=format:%s|||%H|||%h|||%an',
              '--no-merges',
          ]).decode().strip()

          CONV = re.compile(r'^(feat|fix|docs|chore|refactor|style|test|perf)(\([^)]+\))?!?:\s*(.+)$', re.I)

          features, fixes, docs_list, other = [], [], [], []

          for line in raw_log.split('\n'):
              if not line:
                  continue
              parts = line.split('|||')
              if len(parts) < 3:
                  continue
              subject, sha, short = parts[0], parts[1], parts[2]
              if re.search(r'^bump version to', subject, re.I):
                  continue
              url  = f"https://github.com/{repo}/commit/{sha}"
              link = f"[`{short}`]({url})"
              m = CONV.match(subject)
              if m:
                  kind = m.group(1).lower()
                  desc = m.group(3)
                  entry = f"- {desc} {link}"
                  if kind == 'feat':              features.append(entry)
                  elif kind == 'fix':             fixes.append(entry)
                  elif kind == 'docs':            docs_list.append(entry)
                  else:                           other.append(entry)
              else:
                  other.append(f"- {subject} {link}")

          compare_url = (
              f"https://github.com/{repo}/compare/{prev_tag}...{current_tag}"
              if prev_tag else
              f"https://github.com/{repo}/commits/{current_tag}"
          )
          prev_label = prev_tag or "initial"

          logo_url = f"https://raw.githubusercontent.com/{repo}/main/public/assets/guidwell-logo.svg"

          bump_badge = {
              'major': '🚀 Major Release',
              'minor': '✨ Minor Release',
              'patch': '🔧 Patch Release',
          }.get(bump_type, '🔧 Patch Release')

          lines = [
              f'<div align="center">',
              f'  <img src="{logo_url}" height="60" alt="Guidwell" />',
              f'  <br /><br />',
              f'  <h2>Guidwell {current_tag}</h2>',
              f'  <p><strong>{bump_badge}</strong> &nbsp;·&nbsp; A customizable guided wizard for WordPress</p>',
              f'</div>',
              f'',
              f'---',
              f'',
          ]

          if features:
              lines += ['### ✨ New Features', ''] + features + ['']
          if fixes:
              lines += ['### 🐛 Bug Fixes', ''] + fixes + ['']
          if docs_list:
              lines += ['### 📝 Documentation', ''] + docs_list + ['']
          if other:
              lines += ['### 🔧 Other Changes', ''] + other + ['']

          # Include the PR description body if this was a PR merge and it has content
          if pr_body and pr_number:
              cleaned = pr_body.strip()
              # Strip the bot footer line
              cleaned = re.sub(r'\n?🤖 Generated with.*$', '', cleaned, flags=re.S).strip()
              if cleaned:
                  lines += [
                      '---',
                      '',
                      f'### 📋 Pull Request #{pr_number} Notes',
                      '',
                      cleaned,
                      '',
                  ]

          lines += [
              '---',
              '',
              f'**Full Changelog:** [`{prev_label}...{current_tag}`]({compare_url})',
          ]

          with open('/tmp/release-notes.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print(f"Release notes written for {current_tag} ({bump_type})")
          PYEOF

      - name: Update changelog.html
        env:
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 << 'PYEOF'
          import subprocess, os, re
          from datetime import date
          from pathlib import Path
          import html as html_mod

          current_tag = os.environ['CURRENT_TAG']
          bump_type   = os.environ.get('BUMP_TYPE', 'patch')
          pr_title    = os.environ.get('PR_TITLE', '').strip()

          version = current_tag.lstrip('v')                   # "1.5.1"
          anchor  = 'v' + version.replace('.', '-')           # "v1-5-1"
          today   = date.today().strftime('%Y-%m-%d')

          # Previous tag for commit range
          raw_tags = subprocess.check_output(['git', 'tag', '--sort=-version:refname']).decode().strip()
          tags = [t for t in raw_tags.split('\n') if t and t != current_tag]
          prev_tag = tags[0] if tags else None
          log_range = f"{prev_tag}..{current_tag}" if prev_tag else current_tag

          raw_log = subprocess.check_output([
              'git', 'log', log_range, '--pretty=format:%s', '--no-merges',
          ]).decode().strip()

          CONV = re.compile(r'^(feat|fix|docs|chore|refactor|style|test|perf)(\([^)]+\))?!?:\s*(.+)$', re.I)
          features, fixes, docs_list = [], [], []
          for line in raw_log.split('\n'):
              if not line or re.search(r'^bump version to', line, re.I):
                  continue
              m = CONV.match(line)
              if m:
                  kind, desc = m.group(1).lower(), html_mod.escape(m.group(3).strip())
                  if kind == 'feat':   features.append(desc)
                  elif kind == 'fix':  fixes.append(desc)
                  elif kind == 'docs': docs_list.append(desc)

          # Tag badges
          badges = ['<span class="release__tag tag--latest">Latest</span>']
          if features:
              badges.append('<span class="release__tag tag--feature">Feature</span>')
          elif fixes:
              badges.append('<span class="release__tag tag--fix">Fix</span>')

          def change_group(label, items):
              if not items: return ''
              lis = '\n'.join(f'          <li>{item}</li>' for item in items)
              return (f'      <div class="change-group">\n'
                      f'        <div class="change-group__label">{label}</div>\n'
                      f'        <ul class="change-list">\n{lis}\n        </ul>\n      </div>')

          groups = '\n'.join(filter(None, [
              change_group('Added', features),
              change_group('Fixed', fixes),
              change_group('Documentation', docs_list),
          ]))
          if not groups:
              groups = '      <div class="change-group"><div class="change-group__label">Changes</div><ul class="change-list"><li>See GitHub release notes for details.</li></ul></div>'

          badges_html = '\n        '.join(badges)
          new_entry = (
              f'    <!-- v{version} -->\n'
              f'    <div class="release" id="{anchor}">\n'
              f'      <div class="release__header">\n'
              f'        <div class="release__version">v{version}</div>\n'
              f'        {badges_html}\n'
              f'        <span class="release__date">{today}</span>\n'
              f'      </div>\n'
              f'{groups}\n'
              f'    </div>\n\n'
              f'    <hr class="rule"/>\n\n'
          )

          changelog = Path('guidwell-docs/changelog.html')
          html = changelog.read_text()

          # Strip tag--latest from the previously-latest entry
          html = html.replace(
              '<span class="release__tag tag--latest">Latest</span>\n        ',
              '', 1
          )
          html = html.replace(
              '<span class="release__tag tag--latest">Latest</span>\n',
              '', 1
          )

          # Insert new entry before the first existing <!-- v release comment
          marker = '    <!-- v'
          idx = html.find(marker)
          if idx != -1:
              html = html[:idx] + new_entry + html[idx:]

          # Sidebar: build short label from PR title or first feature/fix
          label_src = pr_title or (features[0] if features else fixes[0] if fixes else 'Release')
          # Strip conventional prefix if present
          label_src = re.sub(r'^(feat|fix|docs|chore)\([^)]+\)!?:\s*', '', label_src, flags=re.I)
          label_src = re.sub(r'^(feat|fix|docs|chore)!?:\s*', '', label_src, flags=re.I)
          short_label = html_mod.escape(label_src[:38].rstrip())
          sidebar_link = f'      <a href="#{anchor}" class="sidebar__link active">v{version} — {short_label}</a>\n'

          # Remove active class from previous first sidebar link
          html = re.sub(r'(class="sidebar__link) active"', r'\1"', html, count=1)

          # Insert new sidebar link after the Releases heading
          releases_heading = '<div class="sidebar__heading">Releases</div>\n'
          idx2 = html.find(releases_heading)
          if idx2 != -1:
              insert_at = idx2 + len(releases_heading)
              html = html[:insert_at] + sidebar_link + html[insert_at:]

          changelog.write_text(html)
          print(f'changelog.html updated — added v{version} ({today})')
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guidwell-docs/changelog.html
          git diff --cached --quiet || git commit -m "docs: add v${{ steps.version.outputs.version }} entry to changelog.html"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Guidwell ${{ steps.version.outputs.tag }}
          body_path: /tmp/release-notes.md
          files: ${{ env.ZIP_PATH }}

      - name: Deploy guidwell-docs to WordPress.com
        env:
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -qq
          # -u passes credentials directly to lftp; .netrc is not used for SFTP connections
          lftp -u "welflecreative.wordpress.com,$SFTP_PASS" -e "
            set net:reconnect-interval-base 5;
            set net:max-retries 2;
            set sftp:auto-confirm yes;
            mirror --reverse --delete --parallel=4 guidwell-docs/ /srv/htdocs/guidwell-docs/;
            bye
          " sftp://sftp.wp.com
