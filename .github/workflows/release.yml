name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          CURRENT=$(grep -m1 "define( 'GUIDWELL_VERSION'" guidwell.php \
            | grep -oP "'\K[0-9]+\.[0-9]+\.[0-9]+")

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT → $NEW"

          sed -i "s/ \* Version: ${CURRENT}/ \* Version: ${NEW}/" guidwell.php
          sed -i "s/define( 'GUIDWELL_VERSION', '${CURRENT}' )/define( 'GUIDWELL_VERSION', '${NEW}' )/" guidwell.php

          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW}" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS
        run: npm run build

      - name: Install PHP dependencies (production only)
        run: composer install --no-dev --optimize-autoloader

      - name: Build plugin zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p /tmp/build/guidwell

          rsync -rc \
            --exclude-from=.distignore \
            ./ /tmp/build/guidwell/

          cd /tmp/build
          zip -r guidwell-${VERSION}.zip guidwell/

          echo "ZIP_PATH=/tmp/build/guidwell-${VERSION}.zip" >> $GITHUB_ENV

      - name: Commit version bump and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add guidwell.php
          git commit -m "bump version to ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Guidwell ${{ steps.version.outputs.tag }}
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true
