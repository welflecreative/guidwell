name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS
        run: npm run build

      - name: Install PHP dependencies (production only)
        run: composer install --no-dev --optimize-autoloader

      - name: Build plugin zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/build/guidwell

          rsync -rc \
            --exclude-from=.distignore \
            ./ /tmp/build/guidwell/

          cd /tmp/build
          zip -r guidwell-${VERSION}.zip guidwell/

          echo "ZIP_PATH=/tmp/build/guidwell-${VERSION}.zip" >> $GITHUB_ENV
          echo "VERSION=${VERSION}"                          >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Guidwell v${{ env.VERSION }}
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true
