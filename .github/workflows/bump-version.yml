name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and tag
        run: |
          # Read current version from plugin header
          CURRENT=$(grep -m1 "define( 'GUIDWELL_VERSION'" guidwell.php \
            | grep -oP "'\K[0-9]+\.[0-9]+\.[0-9]+")

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT → $NEW"

          # Update plugin header and version constant in guidwell.php
          sed -i "s/ \* Version: ${CURRENT}/ \* Version: ${NEW}/" guidwell.php
          sed -i "s/define( 'GUIDWELL_VERSION', '${CURRENT}' )/define( 'GUIDWELL_VERSION', '${NEW}' )/" guidwell.php

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add guidwell.php
          git commit -m "bump version to ${NEW}"
          git tag "v${NEW}"
          git push origin main "v${NEW}"
